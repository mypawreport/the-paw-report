<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — The Paw Report</title>
  <link rel="icon" href="https://mypawreport.github.io/the-paw-report/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0d9488;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .tier-badge {
      display: inline-block;
      background: linear-gradient(135deg, #0d9488, #065f55);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 30px;
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }
    .features {
      background: rgba(13,148,136,0.08);
      border: 1px solid rgba(13,148,136,0.2);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      text-align: left;
    }
    .features p {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.85);
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.4;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #0d9488, #065f55);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
    }
    .paw-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .paw-bg span {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0.04;
    }
    .card { position: relative; z-index: 1; }
  </style>
  <!-- Google Ads conversion event fires on page load -->
  <script>
    // Parse tier from URL param e.g. ?tier=gold
    const params = new URLSearchParams(window.location.search);
    const tier = (params.get('tier') || 'gold').toLowerCase();
    const tierLabel = { bronze: '🥉 Bronze', silver: '🥈 Silver', gold: '🥇 Gold' }[tier] || '🥇 Gold';
    const features = {
      bronze: ['🌡️ Ground temp & safety ratings','☀️ 3-day forecast','🔔 Dangerous condition alerts'],
      silver: ['🌡️ Ground temp & safety ratings','☀️ 3-day forecast','📍 Up to 5 saved locations','🔔 All alerts'],
      gold: ['🌡️ Ground temp & safety ratings','☀️ 3-day forecast','📍 Up to 5 saved locations','📜 50-entry walk history','📱 Native tray widget','🔔 All alerts + walk reminders'],
    }[tier] || features?.gold;

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('tier-badge').textContent = tierLabel + ' — Active!';
      const list = document.getElementById('feature-list');
      (features || []).forEach(f => {
        const p = document.createElement('p');
        p.textContent = f;
        list.appendChild(p);
      });
    });
  </script>
</head>
<body>
  <!-- Paw background -->
  <div class="paw-bg" id="pawBg"></div>
  <script>
    var bg = document.getElementById('pawBg');
    for (var i=0; i<30; i++) {
      var s = document.createElement('span');
      s.textContent = '🐾';
      s.style.left = Math.random()*100 + '%';
      s.style.top = Math.random()*100 + '%';
      bg.appendChild(s);
    }
  </script>

  <div class="card">
    <div class="logo">🐾</div>
    <h1>You're all set!</h1>
    <p class="subtitle">Welcome to The Paw Report. Your pup's paws are in good hands.</p>

    <div class="tier-badge" id="tier-badge">🥇 Gold — Active!</div>

    <div class="features">
      <div id="feature-list"></div>
    </div>

    <a class="btn" href="https://mypawreport.github.io/the-paw-report/">
      Open The Paw Report →
    </a>
    <a class="btn btn-secondary" href="mailto:mypawreport@gmail.com">
      Need help? Contact us
    </a>

    <p class="footer">© 2026 The Paw Report · All Rights Reserved</p>
  </div>
</body>
</html>
