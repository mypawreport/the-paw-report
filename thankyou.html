<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — The Paw Report</title>
  <link rel="icon" href="https://mypawreport.github.io/the-paw-report/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 44px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }
    .logo-img {
      width: 72px;
      height: 72px;
      margin: 0 auto 12px;
      display: block;
    }
    .brand {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0d9488;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .check-circle {
      width: 64px;
      height: 64px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto 16px;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.97rem;
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.55;
    }
    .tier-badge {
      display: inline-block;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: #fff;
      font-weight: 700;
      font-size: 0.88rem;
      padding: 7px 22px;
      border-radius: 30px;
      margin-bottom: 28px;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 12px rgba(13,148,136,0.3);
    }
    .features {
      background: #f0fdf9;
      border: 1px solid #99f6e4;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 28px;
      text-align: left;
    }
    .features p {
      font-size: 0.9rem;
      color: #0f4c45;
      padding: 5px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.4;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
      box-shadow: 0 4px 16px rgba(13,148,136,0.3);
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid #e2e8f0;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: none;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    .paw-strip {
      font-size: 1.1rem;
      letter-spacing: 4px;
      color: #0d9488;
      opacity: 0.25;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo-img" src="https://mypawreport.github.io/the-paw-report/icon-192.png" alt="The Paw Report">
    <div class="brand">The Paw Report</div>
    <div class="paw-strip">🐾 🐾 🐾 🐾 🐾</div>

    <div class="check-circle">✅</div>
    <h1>You're all set!</h1>
    <p class="subtitle">Thank you for subscribing. Your pup's paws are now protected on every walk.</p>

    <div class="tier-badge" id="tier-badge">🥇 Gold — Active!</div>

    <div class="features">
      <div id="feature-list"></div>
    </div>

    <a class="btn" href="https://mypawreport.github.io/the-paw-report/">
      Open The Paw Report →
    </a>
    <a class="btn btn-secondary" href="mailto:mypawreport@gmail.com">
      Need help? Contact us
    </a>

    <p class="footer">© 2026 The Paw Report · All Rights Reserved</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const tier = (params.get('tier') || 'gold').toLowerCase();
    const tierLabel = { bronze: '🥉 Bronze', silver: '🥈 Silver', gold: '🥇 Gold' }[tier] || '🥇 Gold';
    const featureMap = {
      bronze: ['🌡️ Ground temp & walk safety ratings','☀️ 3-day forecast','🔔 Dangerous condition alerts'],
      silver: ['🌡️ Ground temp & walk safety ratings','☀️ 3-day forecast','📍 Up to 5 saved locations','🔔 All condition alerts'],
      gold:   ['🌡️ Ground temp & walk safety ratings','☀️ 3-day forecast','📍 Up to 5 saved locations','📜 50-entry walk history','📱 Native tray widget','🔔 All alerts + walk reminders'],
    };
    document.getElementById('tier-badge').textContent = tierLabel + ' — Active!';
    const list = document.getElementById('feature-list');
    (featureMap[tier] || featureMap.gold).forEach(function(f) {
      var p = document.createElement('p');
      p.textContent = f;
      list.appendChild(p);
    });
  </script>
</body>
</html>
